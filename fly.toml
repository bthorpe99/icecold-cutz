app = "icecold-cutz"
primary_region = "atl"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/bookings.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "icecold_data"
  destination = "/data"
  initial_size = "1gb"
